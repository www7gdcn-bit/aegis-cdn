# Demo 接入站点:演示防护流水线真实拦截。生产中此文件由控制面按域名生成下发。
server {
    listen 80 default_server;
    server_name _;

    # 决策日志变量(供 log_by_lua 写入、log_format 读取)
    set $aegis_action  "-";
    set $aegis_risk    "0";
    set $aegis_rule    "-";
    set $aegis_reason  "-";
    set $aegis_bot     "-";
    set $aegis_country "XX";   # 生产由 GeoIP2 模块填充
    set $aegis_asn     "0";    # 生产由 GeoIP2 ASN 库填充

    access_log /usr/local/openresty/nginx/logs/access.json.log aegis_json;

    # 健康检查(不过防护)
    location = /aegis-health {
        access_log off;
        return 200 "ok\n";
    }

    location / {
        # === 防护流水线 ===
        access_by_lua_block {
            require("aegis.access").run()
        }

        # === 回源:demo-origin(生产为客户源站)===
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Aegis-Risk $aegis_risk;
        proxy_pass http://demo-origin:80;

        # === 决策日志落地 ===
        log_by_lua_block {
            require("aegis.log").finalize()
        }
    }
}
