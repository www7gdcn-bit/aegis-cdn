# AegisCDN 控制面(NestJS + PostgreSQL + Redis)本地环境
# 注意:要让"控制面下发 → 边缘生效"端到端打通,控制面与边缘需共用同一个 Redis。
# 本地联调时,把本 compose 的 redis 与 edge/docker-compose.edge.yml 接到同一网络,
# 或让二者 REDIS_URL 指向同一实例。
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis_pass
      POSTGRES_DB: aegis
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgresql://aegis:aegis_pass@postgres:5432/aegis?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local_dev_jwt_secret_at_least_32_chars_xxxx
      CNAME_SUFFIX: aegis-cdn.net
      CORS_ORIGINS: http://localhost:3000
      PORT: "4000"
    ports: ["4000:4000"]

volumes:
  pgdata: {}
