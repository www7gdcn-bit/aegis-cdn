# AegisCDN 边缘节点 OpenResty 主配置
# 运行环境:Linux + OpenResty(>=1.21)。本地 Windows 无法运行,请用 docker-compose.edge.yml。

# 让 Lua 能读到这些环境变量(Redis / 密钥 / DNS)
env REDIS_HOST;
env REDIS_PORT;
env REDIS_PASSWORD;
env AEGIS_SECRET;
env DNS_RESOLVER;

worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;

events {
    worker_connections 10240;
}

http {
    lua_package_path "/etc/openresty/lua/?.lua;;";
    lua_code_cache on;

    # 共享内存:配置/WAF 规则缓存 + JA3 暂存
    lua_shared_dict aegis_cfg 8m;
    lua_shared_dict aegis_waf 8m;
    lua_shared_dict aegis_ja3 16m;

    # rDNS / DNS 解析(善意爬虫校验用)
    resolver 8.8.8.8 1.1.1.1 ipv6=off valid=300s;
    resolver_timeout 2s;

    # 预加载防护模块(每 worker 一次)
    init_by_lua_block {
        require "aegis.config"
        require "aegis.ratelimit"
        require "aegis.waf"
        require "aegis.bot"
        require "aegis.risk"
        require "aegis.challenge"
        require "aegis.ban"
        require "aegis.fingerprint"
        require "aegis.access"
        require "aegis.log"
        require("aegis.geo").init()   -- 加载 GeoIP(无库/无 mmdb 时优雅降级为 XX)
    }

    # 结构化决策日志(JSON);edge-agent tail 后写 ClickHouse
    log_format aegis_json escape=json
        '{"time":"$time_iso8601","host":"$host","ip":"$remote_addr",'
        '"method":"$request_method","uri":"$request_uri","status":$status,'
        '"ua":"$http_user_agent","referer":"$http_referer","bytes":$body_bytes_sent,'
        '"rt":$request_time,"country":"$aegis_country","asn":"$aegis_asn",'
        '"action":"$aegis_action","risk":$aegis_risk,"rule":"$aegis_rule",'
        '"reason":"$aegis_reason","bot":"$aegis_bot","ray":"$request_id"}';

    sendfile on;
    keepalive_timeout 65;
    proxy_http_version 1.1;
    server_tokens off;

    # 真实客户端 IP 还原:边缘前若有 LB/上游,remote_addr 会是上游 IP,
    # 必须从 X-Forwarded-For 还原真实客户端 IP,否则限频/封禁/指纹会按上游 IP 误判。
    # set_real_ip_from 仅信任你的可信上游网段(按实际部署调整;勿信任公网任意来源以防伪造 XFF)。
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    set_real_ip_from 127.0.0.1;

    include /etc/openresty/conf.d/*.conf;
}
